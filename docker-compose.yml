version: "3.8"

services:
  app:
    build: .
    container_name: desafio_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cypress:
    image: cypress/included:13.17.0
    container_name: desafio_cypress
    working_dir: /e2e
    depends_on:
      app:
        condition: service_healthy
    environment:
      - CYPRESS_baseUrl=http://app:3000
    volumes:
      - .:/e2e